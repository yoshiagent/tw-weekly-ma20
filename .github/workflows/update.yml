name: 每週台股 MA20 掃描更新

on:
  schedule:
    # 每週日 UTC 22:00 = 台灣時間 週一 06:00（週末收盤後更新）
    - cron: '0 22 * * 0'
  workflow_dispatch:   # 允許手動觸發

jobs:
  scan-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'          # requirements.txt 不變就直接用快取，不重新下載

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        run: python scan.py

      - name: Commit & push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html margin_cache.json tdcc_cache.json
          git diff --cached --quiet || git commit -m "auto: 更新台股 MA20 掃描結果 $(date -u +'%Y-%m-%d')"
          git push
